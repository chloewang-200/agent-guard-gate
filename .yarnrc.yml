# Yarn PnP: @sentry/opentelemetry lists OTel packages as peers; @sentry/nextjs does not
# depend on them, so the peer chain breaks during webpack resolution. Declare them on the
# ancestor @sentry/nextjs so @sentry/opentelemetry can resolve requires.
packageExtensions:
  "@sentry/nextjs@*":
    dependencies:
      "@opentelemetry/core": "^1.30.1"
      "@opentelemetry/sdk-trace-base": "^1.30.1"
  "framer-motion@*":
    dependencies:
      "@emotion/is-prop-valid": "^1.3.0"
